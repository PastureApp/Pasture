<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>KJV Bible — Pasture</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#faf5ee;--parchment:#f2e8d5;--warm-white:#fdfaf5;
  --sage:#8aab85;--sage-light:#b5cdb2;--sage-dark:#4e7a56;--moss:#3d5e3f;
  --earth:#8b6b4a;--earth-light:#c49a72;
  --gold:#d4a853;--gold-light:#f0d090;
  --text:#2e2318;--text-mid:#6b5240;--text-soft:#9c8070;
  --shadow:rgba(60,40,20,0.12);
  --hl-gold:rgba(255,220,80,0.45);
  --hl-green:rgba(100,200,120,0.4);
  --hl-blue:rgba(100,160,255,0.4);
  --hl-pink:rgba(255,130,160,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);position:fixed;width:100%;touch-action:manipulation}

/* ===== SHELL ===== */
.shell{display:flex;flex-direction:column;height:100%;overflow:hidden}

/* ===== TOP BAR ===== */
.topbar{background:linear-gradient(135deg,var(--moss),var(--sage-dark));padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
.tb-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.18);border:none;color:white;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none}
.tb-title{font-family:'Lora',serif;font-size:1rem;font-weight:700;color:white;flex:1;line-height:1.2}
.tb-sub{font-size:0.65rem;color:rgba(255,255,255,0.75);margin-top:1px}
.tb-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.18);border:none;color:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.tb-btn:active{transform:scale(0.92)}

/* ===== VIEWS ===== */
.view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;background:var(--cream)}
.view.active{display:block}

/* ===== HOME VIEW ===== */
.home-hero{background:linear-gradient(135deg,var(--moss),var(--sage-dark));padding:20px 18px 24px;text-align:center;color:white}
.home-cross{font-size:2.5rem;display:block;margin-bottom:8px}
.home-title{font-family:'Lora',serif;font-size:1.4rem;font-weight:700;color:white;margin-bottom:4px}
.home-verse{font-family:'Lora',serif;font-style:italic;font-size:0.78rem;color:rgba(255,255,255,0.82);line-height:1.6;max-width:260px;margin:0 auto}
.search-bar{display:flex;gap:8px;padding:14px 14px 0;margin-bottom:4px}
.search-input{flex:1;padding:10px 14px;border-radius:50px;border:1.5px solid rgba(180,150,100,0.28);background:white;font-family:'Nunito',sans-serif;font-size:0.86rem;color:var(--text);outline:none;box-shadow:0 2px 8px rgba(60,40,20,0.08)}
.search-input:focus{border-color:var(--sage-dark)}
.search-go{padding:10px 16px;border-radius:50px;border:none;background:var(--moss);color:white;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer}
.section-lbl{font-size:0.62rem;font-weight:800;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.1em;padding:12px 16px 6px;font-family:'Lora',serif}
/* Quick access cards */
.quick-grid{display:flex;gap:8px;flex-wrap:wrap;padding:0 14px 10px}
.quick-card{flex:1;min-width:90px;background:white;border-radius:13px;padding:12px 8px;text-align:center;border:1.5px solid rgba(180,150,100,0.15);cursor:pointer;box-shadow:0 2px 8px rgba(60,40,20,0.07);transition:all 0.2s}
.quick-card:active{transform:scale(0.96)}
.qc-icon{font-size:1.4rem;display:block;margin-bottom:4px}
.qc-name{font-family:'Lora',serif;font-size:0.72rem;font-weight:700;color:var(--moss)}
.qc-chapters{font-size:0.58rem;color:var(--text-soft);margin-top:1px}
/* Bookmarks */
.bookmark-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:white;border-radius:12px;margin:0 14px 8px;border:1px solid rgba(180,150,100,0.12);cursor:pointer;box-shadow:0 1px 6px rgba(60,40,20,0.06);transition:all 0.2s}
.bookmark-item:active{transform:scale(0.98)}
.bm-icon{font-size:1.1rem}
.bm-ref{font-family:'Lora',serif;font-size:0.82rem;font-weight:700;color:var(--moss)}
.bm-text{font-size:0.7rem;color:var(--text-soft);margin-top:1px;font-family:'Lora',serif;font-style:italic}
.bm-del{font-size:0.8rem;color:var(--text-soft);padding:4px 8px;border-radius:8px;background:rgba(180,150,100,0.1);border:none;cursor:pointer}
.no-bookmarks{text-align:center;padding:20px;color:var(--text-soft);font-family:'Lora',serif;font-style:italic;font-size:0.82rem}

/* ===== BOOKS VIEW ===== */
.testament-header{background:linear-gradient(135deg,rgba(61,94,63,0.08),rgba(78,122,86,0.04));padding:10px 16px;border-bottom:1px solid rgba(180,150,100,0.15)}
.testament-title{font-family:'Lora',serif;font-size:0.82rem;font-weight:700;color:var(--moss)}
.testament-desc{font-size:0.62rem;color:var(--text-soft);margin-top:1px}
.book-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid rgba(180,150,100,0.08);cursor:pointer;transition:all 0.18s;background:white}
.book-item:active{background:var(--parchment)}
.book-num{width:26px;height:26px;border-radius:50%;background:rgba(78,122,86,0.1);display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-weight:800;color:var(--moss);flex-shrink:0}
.book-name{font-family:'Lora',serif;font-size:0.88rem;font-weight:700;color:var(--text);flex:1}
.book-chapters{font-size:0.62rem;color:var(--text-soft)}
.book-arrow{font-size:0.75rem;color:var(--gold)}

/* ===== CHAPTERS VIEW ===== */
.chapters-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:14px}
.ch-btn{aspect-ratio:1;border-radius:12px;border:1.5px solid rgba(180,150,100,0.2);background:white;font-family:'Lora',serif;font-size:0.9rem;font-weight:700;color:var(--text-mid);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;box-shadow:0 1px 4px rgba(60,40,20,0.06)}
.ch-btn:active{transform:scale(0.94)}
.ch-btn.has-note{border-color:var(--gold);background:linear-gradient(135deg,rgba(212,168,83,0.12),rgba(240,208,144,0.07))}
.ch-btn.has-highlight{border-color:var(--sage);background:linear-gradient(135deg,rgba(78,122,86,0.1),rgba(61,94,63,0.05))}
.ch-btn.bookmarked{border-color:var(--moss);background:rgba(61,94,63,0.08)}

/* ===== READING VIEW ===== */
.reading-nav{display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(250,245,238,0.97);border-bottom:1px solid rgba(180,150,100,0.15);flex-shrink:0}
.nav-arrow{width:36px;height:36px;border-radius:50%;border:1.5px solid rgba(180,150,100,0.25);background:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.18s;box-shadow:0 1px 4px rgba(60,40,20,0.08)}
.nav-arrow:active{transform:scale(0.92)}
.nav-arrow:disabled{opacity:0.35;cursor:default}
.nav-ref{font-family:'Lora',serif;font-size:0.9rem;font-weight:700;color:var(--moss);flex:1;text-align:center;cursor:pointer}
.reading-toolbar{display:flex;align-items:center;gap:6px;padding:7px 14px;background:rgba(250,245,238,0.97);border-bottom:1px solid rgba(180,150,100,0.12);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.reading-toolbar::-webkit-scrollbar{display:none}
.tool-btn{padding:5px 11px;border-radius:20px;border:1.5px solid rgba(180,150,100,0.22);background:white;font-size:0.7rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.18s;display:flex;align-items:center;gap:4px;color:var(--text-mid)}
.tool-btn:active{transform:scale(0.95)}
.tool-btn.active-tool{border-color:var(--moss);background:rgba(61,94,63,0.1);color:var(--moss)}
.hl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.reading-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px 80px}
.chapter-heading{font-family:'Lora',serif;font-size:1.1rem;font-weight:700;color:var(--moss);margin-bottom:14px;text-align:center;padding-bottom:10px;border-bottom:1px solid rgba(180,150,100,0.2)}
.verse-wrap{margin-bottom:8px;border-radius:8px;padding:4px 6px;transition:background 0.2s;position:relative;cursor:pointer}
.verse-wrap:active{background:rgba(180,150,100,0.08)}
.verse-wrap.selected{background:rgba(78,122,86,0.1);border:1.5px solid var(--sage)}
.verse-wrap.hl-gold{background:var(--hl-gold)}
.verse-wrap.hl-green{background:var(--hl-green)}
.verse-wrap.hl-blue{background:var(--hl-blue)}
.verse-wrap.hl-pink{background:var(--hl-pink)}
.verse-num{font-size:0.62rem;font-weight:800;color:var(--gold);margin-right:4px;vertical-align:super;line-height:1;font-family:'Nunito',sans-serif}
.verse-text{font-family:'Lora',serif;font-size:1rem;line-height:1.75;color:var(--text)}
.verse-note-indicator{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--moss);margin-left:4px;vertical-align:middle;flex-shrink:0}
.reading-font-sm .verse-text{font-size:0.88rem}
.reading-font-lg .verse-text{font-size:1.14rem}
.reading-font-xl .verse-text{font-size:1.28rem}
/* Loading */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text-soft)}
.loading-cross{font-size:2rem;margin-bottom:12px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.loading-text{font-family:'Lora',serif;font-style:italic;font-size:0.84rem}
.error-wrap{text-align:center;padding:40px 20px;color:var(--text-soft)}
.error-text{font-family:'Lora',serif;font-style:italic;font-size:0.84rem;line-height:1.6}
.retry-btn{margin-top:12px;padding:9px 20px;border-radius:50px;border:none;background:var(--moss);color:white;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer}

/* ===== VERSE ACTION PANEL ===== */
.verse-panel{position:fixed;bottom:0;left:0;right:0;background:var(--warm-white);border-radius:20px 20px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,0.15);z-index:100;transform:translateY(100%);transition:transform 0.32s cubic-bezier(0.32,1,0.23,1);padding:16px 18px 28px}
.verse-panel.open{transform:translateY(0)}
.vp-handle{width:36px;height:4px;background:rgba(180,150,100,0.28);border-radius:4px;margin:0 auto 14px;cursor:pointer}
.vp-verse{font-family:'Lora',serif;font-style:italic;font-size:0.84rem;color:var(--text-mid);line-height:1.6;margin-bottom:4px;padding:10px 12px;background:var(--parchment);border-radius:10px}
.vp-ref{font-size:0.7rem;font-weight:700;color:var(--gold);margin-bottom:14px;padding:0 2px}
.vp-section{font-size:0.62rem;font-weight:800;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:7px;font-family:'Lora',serif}
/* Highlight colors */
.hl-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.hl-opt{width:36px;height:36px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700}
.hl-opt:active{transform:scale(0.9)}
.hl-opt.active-hl{border-color:var(--moss);box-shadow:0 0 0 3px rgba(61,94,63,0.2)}
.hl-gold-btn{background:rgba(255,220,80,0.7)}
.hl-green-btn{background:rgba(100,200,120,0.65)}
.hl-blue-btn{background:rgba(100,160,255,0.6)}
.hl-pink-btn{background:rgba(255,130,160,0.6)}
.hl-clear-btn{background:rgba(180,150,100,0.15);color:var(--text-soft);font-size:0.65rem;width:auto;padding:0 10px;border-radius:20px}
/* Bookmark btn */
.vp-actions{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.vp-action-btn{flex:1;min-width:90px;padding:9px 8px;border-radius:12px;border:1.5px solid rgba(180,150,100,0.22);background:var(--parchment);cursor:pointer;font-family:'Nunito',sans-serif;font-size:0.72rem;font-weight:700;color:var(--text-mid);display:flex;align-items:center;justify-content:center;gap:5px;transition:all 0.2s}
.vp-action-btn:active{transform:scale(0.96)}
.vp-action-btn.bookmarked-btn{border-color:var(--gold);background:linear-gradient(135deg,rgba(212,168,83,0.18),rgba(240,208,144,0.1));color:var(--earth)}
/* Notes */
.note-area{width:100%;padding:10px 12px;border-radius:12px;border:1.5px solid rgba(180,150,100,0.28);background:white;font-family:'Lora',serif;font-size:0.86rem;color:var(--text);outline:none;resize:none;min-height:80px;line-height:1.6;margin-bottom:8px}
.note-area:focus{border-color:var(--sage-dark)}
.note-save-btn{width:100%;padding:11px;border-radius:50px;border:none;background:linear-gradient(135deg,var(--sage-dark),var(--moss));color:white;font-family:'Nunito',sans-serif;font-size:0.88rem;font-weight:800;cursor:pointer;box-shadow:0 3px 10px rgba(61,94,63,0.26)}
.note-save-btn:active{transform:scale(0.97)}
/* Panel overlay */
.panel-overlay{position:fixed;inset:0;background:rgba(46,35,24,0.4);z-index:90;display:none;backdrop-filter:blur(2px)}
.panel-overlay.show{display:block}

/* ===== NOTES VIEW ===== */
.note-card{background:white;border-radius:13px;padding:13px;margin:0 14px 9px;border:1px solid rgba(180,150,100,0.12);box-shadow:0 1px 7px rgba(60,40,20,0.07);cursor:pointer}
.nc-ref{font-family:'Lora',serif;font-size:0.85rem;font-weight:700;color:var(--moss);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.nc-del{font-size:0.7rem;color:var(--text-soft);background:rgba(180,150,100,0.1);border:none;padding:2px 7px;border-radius:8px;cursor:pointer}
.nc-verse{font-family:'Lora',serif;font-style:italic;font-size:0.76rem;color:var(--text-soft);margin-bottom:6px;line-height:1.5}
.nc-note{font-size:0.82rem;color:var(--text-mid);line-height:1.55;border-left:3px solid var(--sage);padding-left:8px}
.nc-date{font-size:0.6rem;color:var(--text-soft);margin-top:5px}
.no-notes{text-align:center;padding:30px 20px;color:var(--text-soft);font-family:'Lora',serif;font-style:italic;font-size:0.84rem}

/* ===== SEARCH RESULTS ===== */
.search-result{padding:11px 14px;background:white;border-radius:11px;margin:0 14px 8px;border:1px solid rgba(180,150,100,0.1);cursor:pointer;box-shadow:0 1px 5px rgba(60,40,20,0.06)}
.sr-ref{font-family:'Lora',serif;font-size:0.8rem;font-weight:700;color:var(--moss);margin-bottom:3px}
.sr-text{font-size:0.76rem;color:var(--text-mid);line-height:1.55;font-family:'Lora',serif;font-style:italic}
.sr-highlight{background:var(--hl-gold);border-radius:2px}
.no-results{text-align:center;padding:30px;color:var(--text-soft);font-family:'Lora',serif;font-style:italic;font-size:0.84rem}
.searching-wrap{text-align:center;padding:30px;color:var(--text-soft)}

/* ===== BOTTOM TAB BAR ===== */
.tab-bar{display:flex;background:rgba(250,245,238,0.98);border-top:1.5px solid rgba(180,150,100,0.16);flex-shrink:0;backdrop-filter:blur(10px)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 6px;cursor:pointer;border:none;background:transparent;transition:all 0.2s}
.tab-item:active{background:rgba(78,122,86,0.06)}
.tab-icon{font-size:1.1rem;line-height:1}
.tab-lbl{font-size:0.52rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.04em}
.tab-item.active-tab .tab-lbl{color:var(--moss);font-weight:900}

/* ===== FONT SIZE CONTROLS ===== */
.font-controls{display:flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(250,245,238,0.97);border-bottom:1px solid rgba(180,150,100,0.1);flex-shrink:0}
.font-lbl{font-size:0.62rem;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.06em;flex:1}
.font-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(180,150,100,0.22);background:white;font-size:0.75rem;font-weight:700;color:var(--text-mid);cursor:pointer;display:flex;align-items:center;justify-content:center}
.font-size-disp{font-family:'Lora',serif;font-size:0.78rem;font-weight:700;color:var(--moss);min-width:30px;text-align:center}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sage-light);border-radius:3px}

.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-56px);background:var(--moss);color:white;padding:7px 14px;border-radius:50px;font-size:0.7rem;font-weight:700;z-index:500;transition:transform 0.34s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;box-shadow:0 3px 12px rgba(0,0,0,0.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="shell">
  <!-- TOP BAR -->
  <div class="topbar" id="topbar">
    <a class="tb-back" href="index.html">‹</a>
    <div style="flex:1">
      <div class="tb-title" id="tbTitle">Holy Bible</div>
      <div class="tb-sub" id="tbSub">King James Version</div>
    </div>
    <button class="tb-btn" onclick="switchTab('search')" title="Search">🔍</button>
    <button class="tb-btn" onclick="switchTab('notes')" title="Notes">📝</button>
  </div>

  <!-- HOME VIEW -->
  <div class="view active" id="view-home">
    <div class="home-hero">
      <span class="home-cross">✝️</span>
      <div class="home-title">King James Bible</div>
      <div class="home-verse">"Thy word is a lamp unto my feet, and a light unto my path." — Psalm 119:105</div>
    </div>
    <div class="search-bar">
      <input class="search-input" id="homeSearch" placeholder="Search any word or phrase..." onkeydown="if(event.key==='Enter')doSearch()"/>
      <button class="search-go" onclick="doSearch()">Search</button>
    </div>
    <div class="section-lbl">Quick Access</div>
    <div class="quick-grid" id="quickGrid"></div>
    <div class="section-lbl">📖 All Books</div>
    <div style="display:flex;gap:7px;padding:0 14px 10px">
      <button onclick="showTestament('OT')" id="otBtn" style="flex:1;padding:9px;border-radius:12px;border:1.5px solid rgba(180,150,100,0.25);background:white;font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:700;color:var(--text-mid);cursor:pointer">Old Testament</button>
      <button onclick="showTestament('NT')" id="ntBtn" style="flex:1;padding:9px;border-radius:12px;border:1.5px solid rgba(180,150,100,0.25);background:white;font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:700;color:var(--text-mid);cursor:pointer">New Testament</button>
    </div>
    <div id="booksList"></div>
    <div class="section-lbl">🔖 Bookmarks</div>
    <div id="bookmarksList"></div>
  </div>

  <!-- READING VIEW -->
  <div class="view" id="view-reading" style="display:none;flex-direction:column">
    <div class="reading-nav">
      <button class="nav-arrow" id="prevBtn" onclick="prevChapter()">‹</button>
      <div class="nav-ref" id="navRef" onclick="goToChapters()">Genesis 1</div>
      <button class="nav-arrow" id="nextBtn" onclick="nextChapter()">›</button>
    </div>
    <div class="font-controls">
      <span class="font-lbl">Font Size</span>
      <button class="font-btn" onclick="changeFontSize(-1)">A-</button>
      <span class="font-size-disp" id="fontSizeDisp">M</span>
      <button class="font-btn" onclick="changeFontSize(1)">A+</button>
      <button class="tool-btn" id="hlModeBtn" onclick="toggleHlMode()" style="margin-left:auto">
        <span id="hlModeTxt">✏️ Highlight</span>
      </button>
    </div>
    <div class="reading-body" id="readingBody"></div>
  </div>

  <!-- NOTES VIEW -->
  <div class="view" id="view-notes">
    <div class="section-lbl" style="padding-top:14px">My Notes & Reflections</div>
    <div id="notesList"></div>
  </div>

  <!-- SEARCH VIEW -->
  <div class="view" id="view-search">
    <div style="padding:14px 14px 8px">
      <div style="display:flex;gap:8px">
        <input class="search-input" id="mainSearch" placeholder="Search the KJV Bible..." style="flex:1" onkeydown="if(event.key==='Enter')doMainSearch()"/>
        <button class="search-go" onclick="doMainSearch()">Go</button>
      </div>
      <div style="font-size:0.68rem;color:var(--text-soft);margin-top:7px;font-family:'Lora',serif;font-style:italic">Search through all loaded KJV books</div>
    </div>
    <div id="searchResults"></div>
  </div>

  <!-- BOTTOM TAB BAR -->
  <div class="tab-bar">
    <button class="tab-item active-tab" onclick="switchTab('home')"><span class="tab-icon">📚</span><span class="tab-lbl">Books</span></button>
    <button class="tab-item" onclick="switchTab('reading')"><span class="tab-icon">📖</span><span class="tab-lbl">Reading</span></button>
    <button class="tab-item" onclick="switchTab('search')"><span class="tab-icon">🔍</span><span class="tab-lbl">Search</span></button>
    <button class="tab-item" onclick="switchTab('notes')"><span class="tab-icon">📝</span><span class="tab-lbl">Notes</span></button>
  </div>
</div>

<!-- VERSE ACTION PANEL -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="verse-panel" id="versePanel">
  <div class="vp-handle" onclick="closePanel()"></div>
  <div class="vp-verse" id="vpVerse"></div>
  <div class="vp-ref" id="vpRef"></div>

  <div class="hl-row">
    <div class="hl-opt hl-gold-btn" onclick="applyHighlight('hl-gold')" title="Gold">✓</div>
    <div class="hl-opt hl-green-btn" onclick="applyHighlight('hl-green')" title="Green">✓</div>
    <div class="hl-opt hl-blue-btn" onclick="applyHighlight('hl-blue')" title="Blue">✓</div>
    <div class="hl-opt hl-pink-btn" onclick="applyHighlight('hl-pink')" title="Pink">✓</div>

  </div>

  <div class="vp-actions">
    <button class="vp-action-btn" id="bmBtn" onclick="toggleBookmark()">🔖 Bookmark</button>

  </div>
  <div class="vp-section">My Note</div>
  <textarea class="note-area" id="noteArea" placeholder="Write your reflection, prayer, or note here..."></textarea>
  <button class="note-save-btn" onclick="saveNote()">Save Note ✓</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== BIBLE BOOKS DATA =====
const OT_BOOKS=[
  {id:'genesis',name:'Genesis',abbr:'Gen',chapters:50,icon:'🌱'},
  {id:'exodus',name:'Exodus',abbr:'Exo',chapters:40,icon:'🏔️'},

  {id:'psalms',name:'Psalms',abbr:'Psa',chapters:150,icon:'🎵'},
  {id:'proverbs',name:'Proverbs',abbr:'Pro',chapters:31,icon:'💡'},
  {id:'ecclesiastes',name:'Ecclesiastes',abbr:'Ecc',chapters:12,icon:'🌀'},
  {id:'songofsolomon',name:'Song of Solomon',abbr:'Son',chapters:8,icon:'🌹'},
  {id:'isaiah',name:'Isaiah',abbr:'Isa',chapters:66,icon:'🕊️'},
  {id:'jeremiah',name:'Jeremiah',abbr:'Jer',chapters:52,icon:'😢'},
  {id:'lamentations',name:'Lamentations',abbr:'Lam',chapters:5,icon:'💔'},
  {id:'ezekiel',name:'Ezekiel',abbr:'Eze',chapters:48,icon:'🌊'},
  {id:'daniel',name:'Daniel',abbr:'Dan',chapters:12,icon:'🦁'},
  {id:'hosea',name:'Hosea',abbr:'Hos',chapters:14,icon:'💝'},
  {id:'joel',name:'Joel',abbr:'Joe',chapters:3,icon:'🌾'},
  {id:'amos',name:'Amos',abbr:'Amo',chapters:9,icon:'⚖️'},
  {id:'obadiah',name:'Obadiah',abbr:'Oba',chapters:1,icon:'🏔️'},
  {id:'jonah',name:'Jonah',abbr:'Jon',chapters:4,icon:'🐟'},
  {id:'micah',name:'Micah',abbr:'Mic',chapters:7,icon:'⚖️'},
  {id:'nahum',name:'Nahum',abbr:'Nah',chapters:3,icon:'🌊'},
  {id:'habakkuk',name:'Habakkuk',abbr:'Hab',chapters:3,icon:'🙏'},
  {id:'zephaniah',name:'Zephaniah',abbr:'Zep',chapters:3,icon:'🔥'},
  {id:'haggai',name:'Haggai',abbr:'Hag',chapters:2,icon:'🏛️'},
  {id:'zechariah',name:'Zechariah',abbr:'Zec',chapters:14,icon:'🌿'},
  {id:'malachi',name:'Malachi',abbr:'Mal',chapters:4,icon:'🔥'},
];
const NT_BOOKS=[
  {id:'matthew',name:'Matthew',abbr:'Mat',chapters:28,icon:'📜'},
  {id:'mark',name:'Mark',abbr:'Mar',chapters:16,icon:'⚡'},
  {id:'luke',name:'Luke',abbr:'Luk',chapters:24,icon:'🏥'},
  {id:'john',name:'John',abbr:'Joh',chapters:21,icon:'❤️'},
  {id:'acts',name:'Acts',abbr:'Act',chapters:28,icon:'🕊️'},
  {id:'romans',name:'Romans',abbr:'Rom',chapters:16,icon:'✝️'},
  {id:'1corinthians',name:'1 Corinthians',abbr:'1Co',chapters:16,icon:'💝'},
  {id:'2corinthians',name:'2 Corinthians',abbr:'2Co',chapters:13,icon:'💝'},
  {id:'galatians',name:'Galatians',abbr:'Gal',chapters:6,icon:'🌿'},
  {id:'ephesians',name:'Ephesians',abbr:'Eph',chapters:6,icon:'🛡️'},
  {id:'philippians',name:'Philippians',abbr:'Php',chapters:4,icon:'😊'},
  {id:'colossians',name:'Colossians',abbr:'Col',chapters:4,icon:'🌟'},
  {id:'1thessalonians',name:'1 Thessalonians',abbr:'1Th',chapters:5,icon:'⏰'},
  {id:'2thessalonians',name:'2 Thessalonians',abbr:'2Th',chapters:3,icon:'⏰'},
  {id:'1timothy',name:'1 Timothy',abbr:'1Ti',chapters:6,icon:'📋'},
  {id:'2timothy',name:'2 Timothy',abbr:'2Ti',chapters:4,icon:'📋'},
  {id:'titus',name:'Titus',abbr:'Tit',chapters:3,icon:'📋'},
  {id:'philemon',name:'Philemon',abbr:'Phm',chapters:1,icon:'🤝'},
  {id:'hebrews',name:'Hebrews',abbr:'Heb',chapters:13,icon:'⚓'},
  {id:'james',name:'James',abbr:'Jas',chapters:5,icon:'💪'},
  {id:'1peter',name:'1 Peter',abbr:'1Pe',chapters:5,icon:'🪨'},
  {id:'2peter',name:'2 Peter',abbr:'2Pe',chapters:3,icon:'🪨'},
  {id:'1john',name:'1 John',abbr:'1Jo',chapters:5,icon:'❤️'},
  {id:'2john',name:'2 John',abbr:'2Jo',chapters:1,icon:'❤️'},
  {id:'3john',name:'3 John',abbr:'3Jo',chapters:1,icon:'❤️'},
  {id:'jude',name:'Jude',abbr:'Jud',chapters:1,icon:'⚔️'},
  {id:'revelation',name:'Revelation',abbr:'Rev',chapters:22,icon:'🌅'},
];
const ALL_BOOKS=[...OT_BOOKS,...NT_BOOKS];
const QUICK_BOOKS=[
  {id:'psalms',name:'Psalms',icon:'🎵',chapters:150},
  {id:'proverbs',name:'Proverbs',icon:'💡',chapters:31},
  {id:'john',name:'John',icon:'❤️',chapters:21},
  {id:'matthew',name:'Matthew',icon:'📜',chapters:28},
  {id:'romans',name:'Romans',icon:'✝️',chapters:16},
  {id:'genesis',name:'Genesis',icon:'🌱',chapters:50},
  {id:'isaiah',name:'Isaiah',icon:'🕊️',chapters:66},
  {id:'revelation',name:'Revelation',icon:'🌅',chapters:22},
];

// ===== STATE =====
function loadBibleState(){
  try{const s=localStorage.getItem('pasture_bible');if(s)return JSON.parse(s);}catch(e){}
  return{highlights:{},notes:{},bookmarks:[],lastBook:'psalms',lastChapter:23,fontSizeIdx:1};
}
let B=loadBibleState();
function saveB(){try{localStorage.setItem('pasture_bible',JSON.stringify(B));}catch(e){}}

// ===== CURRENT STATE =====
let curBook='psalms';
let curChapter=23;
let curVerse=null; // {book, chapter, verse, text}
let hlMode=false;
let curTab='home';
let curTestament='OT';
const fontSizes=['reading-font-sm','','reading-font-lg','reading-font-xl'];
const fontLabels=['S','M','L','XL'];

// ===== INIT =====
function init(){
  buildQuickGrid();
  showTestament('NT');
  renderBookmarks();
  renderNotes();
  // Restore last reading
  curBook=B.lastBook||'psalms';
  curChapter=B.lastChapter||23;
  if(curBook&&curChapter)loadChapter(curBook,curChapter,false);
  document.getElementById('fontSizeDisp').textContent=fontLabels[B.fontSizeIdx||1];
}

// ===== QUICK GRID =====
function buildQuickGrid(){
  document.getElementById('quickGrid').innerHTML=QUICK_BOOKS.map(b=>`
    <div class="quick-card" onclick="goToBook('${b.id}')">
      <span class="qc-icon">${b.icon}</span>
      <div class="qc-name">${b.name}</div>
      <div class="qc-chapters">${b.chapters} chapters</div>
    </div>`).join('');
}

// ===== TESTAMENT LIST =====
function showTestament(t){
  curTestament=t;
  const books=t==='OT'?OT_BOOKS:NT_BOOKS;
  const label=t==='OT'?{title:'Old Testament',desc:'39 Books — From Creation to the Prophets'}:{title:'New Testament',desc:'27 Books — The Life of Christ to Revelation'};
  document.getElementById('otBtn').style.background=t==='OT'?'var(--moss)':'white';
  document.getElementById('otBtn').style.color=t==='OT'?'white':'var(--text-mid)';
  document.getElementById('ntBtn').style.background=t==='NT'?'var(--moss)':'white';
  document.getElementById('ntBtn').style.color=t==='NT'?'white':'var(--text-mid)';
  document.getElementById('booksList').innerHTML=`
    <div class="testament-header"><div class="testament-title">${label.title}</div><div class="testament-desc">${label.desc}</div></div>
    ${books.map((b,i)=>`<div class="book-item" onclick="goToBook('${b.id}')">
      <div class="book-num">${i+1}</div>
      <div style="flex:1"><div class="book-name">${b.name}</div><div class="book-chapters">${b.chapters} chapters</div></div>
      <span class="book-arrow">›</span>
    </div>`).join('')}`;
}

// ===== GO TO BOOK (chapters) =====
function goToBook(bookId){
  const book=ALL_BOOKS.find(b=>b.id===bookId);
  if(!book)return;
  curBook=bookId;
  // Show chapter selector in reading view
  switchTab('reading');
  showChapterSelector(book);
}
function showChapterSelector(book){
  document.getElementById('navRef').textContent=book.name;
  document.getElementById('tbTitle').textContent=book.name;
  document.getElementById('tbSub').textContent='Select a Chapter';
  const body=document.getElementById('readingBody');
  const hl=Object.keys(B.highlights).filter(k=>k.startsWith(book.id+':'));
  const notes=Object.keys(B.notes).filter(k=>k.startsWith(book.id+':'));
  const bms=B.bookmarks.filter(b=>b.startsWith(book.id+':'));
  body.innerHTML=`<div class="chapter-heading">${book.name}</div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:4px 0">
      ${Array.from({length:book.chapters},(_,i)=>{
        const ref=`${book.id}:${i+1}`;
        const hasN=notes.some(n=>n.startsWith(ref+':'));
        const hasH=hl.some(h=>h.startsWith(ref+':'));
        const hasBm=bms.some(b=>b.startsWith(ref+':'));
        const cls=(hasN?'has-note ':'')+( hasH?'has-highlight ':'')+( hasBm?'bookmarked ':'');
        return`<button class="ch-btn ${cls}" onclick="loadChapter('${book.id}',${i+1})">${i+1}</button>`;
      }).join('')}
    </div>`;
  document.getElementById('prevBtn').disabled=true;
  document.getElementById('nextBtn').disabled=true;
}

// ===== LOAD CHAPTER =====
async function loadChapter(bookId,chapter,navigate=true){
  curBook=bookId;curChapter=chapter;
  B.lastBook=bookId;B.lastChapter=chapter;saveB();
  if(navigate)switchTab('reading');
  const book=ALL_BOOKS.find(b=>b.id===bookId);
  if(!book)return;
  document.getElementById('navRef').textContent=`${book.name} ${chapter}`;
  document.getElementById('tbTitle').textContent=book.name;
  document.getElementById('tbSub').textContent=`Chapter ${chapter} — KJV`;
  document.getElementById('prevBtn').disabled=chapter<=1;
  document.getElementById('nextBtn').disabled=chapter>=book.chapters;
  const body=document.getElementById('readingBody');
  body.innerHTML=`<div class="loading-wrap"><div class="loading-cross">✝️</div><div class="loading-text">Loading ${book.name} ${chapter}...</div></div>`;
  // Fetch from bible-api.com
  try{
    const abbr=book.abbr;
    const url=`https://bible-api.com/${encodeURIComponent(abbr+' '+chapter)}?translation=kjv`;
    const res=await fetch(url);
    if(!res.ok)throw new Error('Failed');
    const data=await res.json();
    renderChapter(book,chapter,data.verses||[]);
  }catch(e){
    body.innerHTML=`<div class="error-wrap"><div class="loading-cross">📖</div><div class="error-text">Could not load this chapter.<br/>Please check your internet connection.<br/><br/><em>"Man shall not live by bread alone, but by every word of God." — Luke 4:4</em></div><button class="retry-btn" onclick="loadChapter('${bookId}',${chapter})">Try Again</button></div>`;
  }
}

// ===== RENDER CHAPTER =====
function renderChapter(book,chapter,verses){
  const body=document.getElementById('readingBody');
  const fontClass=fontSizes[B.fontSizeIdx||1];
  body.className=`reading-body ${fontClass}`;
  body.innerHTML=`<div class="chapter-heading">${book.name} — Chapter ${chapter}<br/><span style="font-size:0.7rem;color:var(--text-soft);font-weight:400;font-family:'Nunito',sans-serif">King James Version</span></div>
  ${verses.map(v=>{
    const key=`${book.id}:${chapter}:${v.verse}`;
    const hl=B.highlights[key]||'';
    const hasNote=!!B.notes[key];
    const isBm=B.bookmarks.includes(key);
    return`<div class="verse-wrap ${hl}" id="v${v.verse}" onclick="selectVerse('${book.id}',${chapter},${v.verse},this)" data-key="${key}">
      <span class="verse-num">${v.verse}</span><span class="verse-text">${v.text.trim()}</span>${hasNote?'<span class="verse-note-indicator" title="Has note"></span>':''}${isBm?'<span style="font-size:0.65rem;margin-left:3px">🔖</span>':''}
    </div>`;
  }).join('')}
  <div style="text-align:center;padding:20px 0;color:var(--text-soft);font-family:'Lora',serif;font-style:italic;font-size:0.78rem">— End of ${book.name} ${chapter} —</div>`;
  body.scrollTop=0;
}

// ===== NAVIGATION =====
function prevChapter(){if(curChapter>1)loadChapter(curBook,curChapter-1);}
function nextChapter(){const book=ALL_BOOKS.find(b=>b.id===curBook);if(book&&curChapter<book.chapters)loadChapter(curBook,curChapter+1);}
function goToChapters(){const book=ALL_BOOKS.find(b=>b.id===curBook);if(book)showChapterSelector(book);}

// ===== VERSE SELECTION =====
function selectVerse(bookId,chapter,verseNum,el){
  // Find verse text
  const spans=el.querySelectorAll('.verse-text');
  const text=spans.length?spans[0].textContent:'';
  const book=ALL_BOOKS.find(b=>b.id===bookId);
  curVerse={key:`${bookId}:${chapter}:${verseNum}`,ref:`${book?book.name:'Bible'} ${chapter}:${verseNum}`,text:text};
  // Clear previous selection
  document.querySelectorAll('.verse-wrap.selected').forEach(v=>v.classList.remove('selected'));
  el.classList.add('selected');
  openPanel();
}
function openPanel(){
  if(!curVerse)return;
  document.getElementById('vpVerse').textContent='"'+curVerse.text.trim()+'"';
  document.getElementById('vpRef').textContent=curVerse.ref+' — KJV';
  // Set bookmark state
  const isBm=B.bookmarks.includes(curVerse.key);
  const bmBtn=document.getElementById('bmBtn');
  bmBtn.textContent=isBm?'🔖 Bookmarked':'🔖 Bookmark';
  bmBtn.className='vp-action-btn'+(isBm?' bookmarked-btn':'');
  // Load existing note
  document.getElementById('noteArea').value=B.notes[curVerse.key]||'';
  document.getElementById('panelOverlay').classList.add('show');
  document.getElementById('versePanel').classList.add('open');
}
function closePanel(){
  document.getElementById('panelOverlay').classList.remove('show');
  document.getElementById('versePanel').classList.remove('open');
  document.querySelectorAll('.verse-wrap.selected').forEach(v=>v.classList.remove('selected'));
}

// ===== HIGHLIGHT =====
let hlModeActive=false;
function toggleHlMode(){
  hlModeActive=!hlModeActive;
  const btn=document.getElementById('hlModeBtn');
  btn.className='tool-btn'+(hlModeActive?' active-tool':'');
  document.getElementById('hlModeTxt').textContent=hlModeActive?'✏️ Highlighting...':'✏️ Highlight';
  showToast(hlModeActive?'Tap any verse to highlight it':'Highlight mode off');
}
function applyHighlight(hlClass){
  if(!curVerse)return;
  const key=curVerse.key;
  if(hlClass){B.highlights[key]=hlClass;}else{delete B.highlights[key];}
  saveB();
  // Update DOM
  const verseNum=parseInt(key.split(':')[2]);
  const el=document.getElementById('v'+verseNum);
  if(el){
    el.className='verse-wrap'+(hlClass?' '+hlClass:'');
  }
  closePanel();
  showToast(hlClass?'✨ Verse highlighted!':'Highlight removed');
}

// ===== BOOKMARK =====
function toggleBookmark(){
  if(!curVerse)return;
  const key=curVerse.key;
  const idx=B.bookmarks.indexOf(key);
  if(idx>=0){
    B.bookmarks.splice(idx,1);
    showToast('Bookmark removed');
  }else{
    B.bookmarks.push(key);
    showToast('🔖 Verse bookmarked!');
  }
  saveB();
  // Update button
  const isBm=B.bookmarks.includes(key);
  const bmBtn=document.getElementById('bmBtn');
  bmBtn.textContent=isBm?'🔖 Bookmarked':'🔖 Bookmark';
  bmBtn.className='vp-action-btn'+(isBm?' bookmarked-btn':'');
  renderBookmarks();
}

// ===== NOTES =====
function saveNote(){
  if(!curVerse)return;
  const text=document.getElementById('noteArea').value.trim();
  if(text){B.notes[curVerse.key]={text,ref:curVerse.ref,verse:curVerse.text,date:new Date().toLocaleDateString()};}
  else{delete B.notes[curVerse.key];}
  saveB();
  closePanel();
  renderNotes();
  showToast(text?'📝 Note saved!':'Note deleted');
  // Re-render chapter to update indicators
  const book=ALL_BOOKS.find(b=>b.id===curBook);
  if(book)loadChapter(curBook,curChapter,false);
}
function renderNotes(){
  const container=document.getElementById('notesList');
  const notes=Object.entries(B.notes).sort((a,b)=>b[0].localeCompare(a[0]));
  if(!notes.length){container.innerHTML='<div class="no-notes">No notes yet. Tap any verse while reading to add a reflection. 📖</div>';return;}
  container.innerHTML=notes.map(([key,n])=>`
    <div class="note-card" onclick="goToNoteRef('${key}')">
      <div class="nc-ref">${n.ref} <button class="nc-del" onclick="event.stopPropagation();deleteNote('${key}')">Delete</button></div>
      <div class="nc-verse">"${n.verse.substring(0,100)}${n.verse.length>100?'...':''}"</div>
      <div class="nc-note">${n.text}</div>
      <div class="nc-date">${n.date||''}</div>
    </div>`).join('');
}
function deleteNote(key){
  delete B.notes[key];saveB();renderNotes();showToast('Note deleted');
}
function goToNoteRef(key){
  const parts=key.split(':');
  if(parts.length>=2){loadChapter(parts[0],parseInt(parts[1]));switchTab('reading');}
}

// ===== BOOKMARKS RENDER =====
function renderBookmarks(){
  const container=document.getElementById('bookmarksList');
  if(!B.bookmarks.length){container.innerHTML='<div class="no-bookmarks">No bookmarks yet. Tap any verse to bookmark it. 🔖</div>';return;}
  container.innerHTML=B.bookmarks.map(key=>{
    const parts=key.split(':');
    const book=ALL_BOOKS.find(b=>b.id===parts[0]);
    const ref=book?`${book.name} ${parts[1]}:${parts[2]}`:`${parts[0]} ${parts[1]}:${parts[2]}`;
    return`<div class="bookmark-item" onclick="loadChapter('${parts[0]}',${parts[1]});switchTab('reading')">
      <span class="bm-icon">🔖</span>
      <div style="flex:1"><div class="bm-ref">${ref}</div></div>
      <button class="bm-del" onclick="event.stopPropagation();removeBookmark('${key}')">✕</button>
    </div>`;
  }).join('');
}
function removeBookmark(key){
  B.bookmarks=B.bookmarks.filter(b=>b!==key);saveB();renderBookmarks();}

// ===== COPY / SHARE =====
function copyVerse(){
  if(!curVerse)return;
  const text=`"${curVerse.text.trim()}" — ${curVerse.ref} KJV`;
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>showToast('📋 Copied!'));}
  else{showToast('📋 Copy: '+curVerse.ref);}
}
function shareVerse(){
  if(!curVerse)return;
  const text=`"${curVerse.text.trim()}" — ${curVerse.ref} KJV\n\nShared from Pasture App — pastureapp.org`;
  if(navigator.share){navigator.share({title:'Pasture — '+curVerse.ref,text});}
  else{copyVerse();}
}

// ===== FONT SIZE =====
function changeFontSize(dir){
  B.fontSizeIdx=Math.max(0,Math.min(3,(B.fontSizeIdx||1)+dir));
  saveB();
  document.getElementById('fontSizeDisp').textContent=fontLabels[B.fontSizeIdx];
  const body=document.getElementById('readingBody');
  body.className='reading-body '+fontSizes[B.fontSizeIdx];
}

function doSearch(){const q=document.getElementById('homeSearch').value.trim();if(q){switchTab('search');document.getElementById('mainSearch').value=q;doMainSearch();}}
function doMainSearch(){
  const q=(document.getElementById('mainSearch').value||'').trim().toLowerCase();
  const container=document.getElementById('searchResults');
  if(!q){container.innerHTML='<div class="no-results">Type a word or phrase to search</div>';return;}
  container.innerHTML='<div class="searching-wrap"><div class="loading-cross">🔍</div></div>';
  setTimeout(()=>{
    const results=SEARCH_VERSES.filter(v=>v.text.toLowerCase().includes(q)||v.ref.toLowerCase().includes(q));
    if(!results.length){container.innerHTML='<div class="no-results">No results found for "'+q+'".<br/><br/>Try loading the book directly and using Ctrl+F, or search for a different word.</div>';return;}
    const hl=t=>t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="sr-highlight">$1</span>');
    container.innerHTML='<div style="font-size:0.7rem;color:var(--text-soft);padding:8px 14px">'+(results.length)+' result'+(results.length>1?'s':'')+' found</div>'+results.map(r=>`<div class="search-result" onclick="loadChapter('${r.book}',${r.ch});switchTab('reading')"><div class="sr-ref">${r.ref}</div><div class="sr-text">${hl(r.text)}</div></div>`).join('');
  },300);
}

// ===== TAB SWITCHING =====
function switchTab(tab){
  curTab=tab;
  ['home','reading','notes','search'].forEach(t=>{
    const v=document.getElementById('view-'+t);
    if(v){v.style.display=tab===t?'block':'none';if(tab===t)v.classList.add('active');else v.classList.remove('active');}
  });
  // Reading view needs flex
  if(tab==='reading'){
    const rv=document.getElementById('view-reading');
    rv.style.display='flex';rv.style.flexDirection='column';
    // Make reading body fill remaining space
    const body=document.getElementById('readingBody');
    body.style.flex='1';body.style.overflowY='auto';
  }
  document.querySelectorAll('.tab-item').forEach((t,i)=>{
    const tabs=['home','reading','search','notes'];
    t.classList.toggle('active-tab',tabs[i]===tab);
  });
  // Update topbar
  const titles={home:'Holy Bible',reading:'Reading',notes:'My Notes',search:'Search KJV'};
  const subs={home:'King James Version',reading:'King James Version',notes:'Reflections & Notes',search:'All loaded books'};
  document.getElementById('tbTitle').textContent=titles[tab]||'Bible';
  document.getElementById('tbSub').textContent=subs[tab]||'KJV';
}

// ===== TOAST =====
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400);}

init();
